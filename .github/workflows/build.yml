name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: desktop-app
        run: npm install

      - name: Build with esbuild
        working-directory: desktop-app
        run: npm run build:js

      - name: Build portable EXE
        working-directory: desktop-app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ninja-windows-exe
          path: desktop-app/dist/NinjaBot.exe

      - name: Publish to "latest" release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automatic build of `NinjaBot.exe` from commit ${{ github.sha }}.
            
            **Pure Native Windows Application** - No Python, No Console!
            
            Features:
            - Native Windows desktop app (Electron)
            - Telegram auto-reply with Mistral AI
            - No terminal/console window
            - Standalone portable EXE
            
            On first login, you'll need to enter your Telegram phone number and verification code in the console that appears.
          files: desktop-app/dist/NinjaBot.exe
          prerelease: false
          make_latest: true
