name: Ninja Userbot CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd app && pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 app/main.py --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Check syntax
      run: |
        python -m py_compile app/main.py
        echo "✅ Syntax check passed!"

  build-windows:
    runs-on: windows-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd app && pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        cd app
        pyinstaller --onefile --name ninja-userbot --console main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ninja-windows
        path: app/dist/ninja-userbot.exe

  build-linux:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd app && pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        cd app
        pyinstaller --onefile --name ninja-userbot --console main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ninja-linux
        path: app/dist/ninja-userbot
